<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Hạt Điều Vàng</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-body">

  <!-- HEADER ADMIN -->
  <header class="admin-header">
    <div class="admin-header-inner">
      <div class="logo">
        <span class="logo-icon">🌰</span>
        <span class="logo-text">Quản Trị Sản Phẩm</span>
      </div>
      <div class="admin-actions">
        <span class="product-count" id="product-count"></span>
        <button class="btn-admin btn-add-product"  id="btn-add-product">+ Thêm sản phẩm</button>
        <button class="btn-admin btn-save-all"     id="btn-save-all">💾 Lưu tất cả</button>
        <button class="btn-admin btn-change-pw"    id="btn-change-pw">🔑 Đổi mật khẩu</button>
        <a href="index.html" class="btn-admin btn-view-site">🌐 Xem trang</a>
        <button class="btn-admin btn-logout"       id="btn-logout">Đăng xuất</button>
      </div>
    </div>
  </header>

  <!-- THÔNG BÁO -->
  <div class="admin-toast" id="admin-toast"></div>

  <!-- LƯỚI SẢN PHẨM ADMIN -->
  <main class="admin-main">
    <div class="admin-grid" id="admin-grid"></div>
  </main>

  <!-- MODAL XÁC NHẬN XÓA -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal-box modal-box--confirm">
      <h3>Xóa sản phẩm?</h3>
      <p id="delete-modal-msg"></p>
      <div class="confirm-actions">
        <button class="btn-admin btn-cancel" id="delete-cancel">Hủy</button>
        <button class="btn-admin btn-delete-confirm" id="delete-confirm">Xóa</button>
      </div>
    </div>
  </div>

  <!-- MODAL ĐỔI MẬT KHẨU -->
  <div class="modal-overlay" id="pw-modal">
    <div class="modal-box modal-box--confirm" style="max-width:360px;text-align:left">
      <h3 style="margin-bottom:16px;color:#4a2c0a">🔑 Đổi mật khẩu</h3>

      <div style="display:flex;flex-direction:column;gap:12px">
        <div>
          <label style="font-size:.82rem;font-weight:600;color:#2d1a07;display:block;margin-bottom:4px">Tên đăng nhập mới</label>
          <input id="new-username" type="text" placeholder="Để trống = giữ nguyên"
            style="width:100%;border:1.5px solid #e2e8f0;border-radius:6px;padding:8px 10px;font-size:.9rem" />
        </div>
        <div>
          <label style="font-size:.82rem;font-weight:600;color:#2d1a07;display:block;margin-bottom:4px">Mật khẩu mới</label>
          <input id="new-password" type="password" placeholder="Nhập mật khẩu mới"
            style="width:100%;border:1.5px solid #e2e8f0;border-radius:6px;padding:8px 10px;font-size:.9rem" />
        </div>
        <div>
          <label style="font-size:.82rem;font-weight:600;color:#2d1a07;display:block;margin-bottom:4px">Xác nhận mật khẩu</label>
          <input id="confirm-password" type="password" placeholder="Nhập lại mật khẩu"
            style="width:100%;border:1.5px solid #e2e8f0;border-radius:6px;padding:8px 10px;font-size:.9rem" />
        </div>
        <p id="pw-error" style="color:#e53e3e;font-size:.82rem;min-height:16px"></p>
      </div>

      <div class="confirm-actions" style="margin-top:8px">
        <button class="btn-admin btn-cancel" id="pw-cancel">Hủy</button>
        <button class="btn-admin btn-save-all" id="pw-save">Lưu</button>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
